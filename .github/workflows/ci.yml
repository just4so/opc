name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Type Check + Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/test' }}

      - name: Validate Prisma schema
        run: npx prisma validate
        env:
          DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/test'

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/test'
          NEXTAUTH_URL: 'http://localhost:3000'
          NEXTAUTH_SECRET: 'test-secret-for-ci-only'
          NEXT_PUBLIC_BMAP_KEY: 'test-key'
