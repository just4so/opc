name: Fetch News

on:
  schedule:
    # 每小时运行一次
    - cron: '0 * * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch News from RSS
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.NEWS_FETCH_API_KEY }}" \
            -H "Content-Type: application/json" \
            https://www.opcquan.com/api/news/fetch
        continue-on-error: true
